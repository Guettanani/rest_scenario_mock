[flake8]
exclude =
    .git,
    __pycache__,
    build,
    dist,
    env,
    venv,
    .venv
max-line-length = 88
# E203/W503 : Recommandé par Black
# E501 : Ignore la longueur de ligne (déjà gérée au mieux par Black)
# E402 : Ignore la position des imports (pratique pour les imports tardifs)
# F824 : Ignore les déclarations globales inutilisées
extend-ignore = E203, W503, E501, E402, F824, E265, W293