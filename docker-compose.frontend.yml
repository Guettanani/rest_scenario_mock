# =============================================================================
# Docker Compose — Full-Stack Frontend + Backend (Nginx reverse proxy)
# =============================================================================
# Usage:
#   docker compose -f docker-compose.frontend.yml up --build -d
#   docker compose -f docker-compose.frontend.yml down
#
# Frontend : http://localhost:3001  (nginx → SPA + /api/* → backend)
# Backend  : http://localhost:8002  (FastAPI direct access)
# =============================================================================

services:
  # ===========================================================================
  # Backend — FastAPI REST server
  # ===========================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.rest
    image: vr-scenario-lib:rest-latest
    container_name: vr-scenario-lib-backend
    ports:
      - "8002:8000"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_EMBEDDING_API_KEY=${OPENROUTER_EMBEDDING_API_KEY}
      - OPENROUTER_API_URL=${OPENROUTER_API_URL:-https://openrouter.ai/api/v1/chat/completions}
      - OPENROUTER_EMBEDDING_API_URL=${OPENROUTER_EMBEDDING_API_URL:-https://openrouter.ai/api/v1/embeddings}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-huggingface}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LLM_MODEL=${LLM_MODEL:-google/gemma-4-31b-it:free}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      - DEVICE=${DEVICE:-cpu}
      - HF_INFERENCE_ENDPOINT=${HF_INFERENCE_ENDPOINT:-https://api-inference.hf.co}
      - DOCS_DIR=/app/documents
      - FAISS_DIR=/app/faiss_index
      - SCENARIOS_DIR=/app/scenarios
    volumes:
      - ./documents:/app/documents:ro
      - ./output:/app/output
      - ./scenarios:/app/scenarios
      - faiss-cache:/app/faiss_index
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--docs-dir"
      - "/app/documents"
      - "--faiss-dir"
      - "/app/faiss_index"
      - "--scenarios-dir"
      - "/app/scenarios"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================================================
  # Frontend — Nginx serving compiled React SPA + reverse proxy for /api/*
  # ===========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: vr-scenario-lib:frontend-latest
    container_name: vr-scenario-lib-frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

# ===========================================================================
# Volumes persistants
# ===========================================================================
volumes:
  faiss-cache:
    driver: local

# ===========================================================================
# Réseau interne
# ===========================================================================
networks:
  app-network:
    name: vr-scenario-lib-app-network
    driver: bridge
